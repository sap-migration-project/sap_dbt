version: 2

models:
  - name: fct_purchase_order_items
    description: "Incremental fact table of PO line items, merged on mandt+PO+item."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - mandt
              - purchase_order_number
              - item_number
    columns:
      - name: mandt
        tests:
          - not_null
      - name: purchase_order_number
        tests:
          - not_null
      - name: item_number
        tests:
          - not_null