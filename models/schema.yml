      description: Accounting Document Header And line Item Details
      columns: 
          - name: accounting_document_number
            tests:
               - not_null

          - name: fiscal_year
            tests:
               - not_null

          - name : line_item_number
            tests:
               - not_null

          - name: company_code
            tests:
               - not_null
               
    - name: int_sales_orders
      description: Sales Orders Enriched With Item details
      columns:
        - name: sales_order_number
          tests:
              - not_null
        - name: item_number
          tests:
             - not_null
        - name: customer_number
          tests:
             - not_null
            

            
              
            
            
              
              

              
              
              

              
                         
    
              
               
              
              
               
                
                