version: 2

models:
  - name: my_first_dbt_model
    description: "A starter dbt model"
    columns:
      - name: id
        description: "The primary key for this table"
        tests:
          - unique
          - not_null
  - name: my_second_dbt_model
    description: "A starter dbt model"
    columns:
      - name: id
        description: "The primary key for this table"
        tests:
          - unique
          - not_null
  - name: stg_customers
    description: Customers staging created from raw KNA1
    columns:
      - name: customer_number
        tests:
          - not_null
          - unique
      - name: customer_name
        tests:
          - not_null
  - name: stg_sales_orders
    columns:
      - name: sales_order_number
        tests:
          - not_null
          - unique
  - name: stg_sales_order_items
    description: "Sales order line items joined with header (VBAK) and customer (KNA1) data"
    columns:
      - name: sales_order_item_skey
        description: "Surrogate key generated from sales_order_number + item_number"
        tests:
          - not_null
          - unique
      - name: sales_order_number
        tests:
          - not_null
      - name: item_number
        tests:
          - not_null
      - name: order_quantity
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                strictly: false
      - name: item_price
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                strictly: false
      - name: net_value
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                strictly: false
      - name: currency
        tests:
          - dbt_expectations.expect_column_value_lengths_to_equal:
              arguments:
                value: 3 # SAP currency codes are always 3 chars, e.g. USD, EUR, INR
  - name: stg_purchase_order_items
    description: Purchase OrderItems Enriched With Header and Vendor Details
    columns:
      - name: purchase_order_number
        tests:
          - not_null

      - name: item_number
        tests:
          - not_null

      - name: vendor_number
        tests:
          - not_null

      - name: vendor_number

      - name: material_number
  - name: stg_accounting_documents
    description: Accounting Document Header And line Item Details

    columns:
      - name: accounting_document_number
        tests:
          - not_null

      - name: fiscal_year
        tests:
          - not_null

      - name: line_item_number
        tests:
          - not_null

      - name: company_code
        tests:
          - not_null
  - name: int_sales_orders
    description: Sales Orders Enriched With Item details

    columns:
      - name: sales_order_number
        tests:
          - not_null
      - name: item_number
        tests:
          - not_null
      - name: customer_number
        tests:
          - not_null
  - name: fct_sales
    description: fact table cointaing sales ordr line level transactions
    columns:
      - name: sales_order_number
        tests:
          - not_null
      - name: item_number
        tests:
          - not_null
      - name: customer_number
        tests:
          - not_null
      - name: sales_amount
        tests:
          - not_null
  - name: dim_customers
    description: Customer Dimention
    columns:
      - name: customer_number
        tests:
          - not_null
          - unique
      - name: customer_name
        tests:
          - not_null
  - name: dim_products
    description: Product dimension
    columns:
      - name: material_number
        tests:
          - not_null
          - unique
      - name: material_descripition
  - name: stg_purchase_orders
    columns:
      - name: vendor_number
        tests:
          - not_null
          - relationships:
              to: ref('stg_vendor')
              field: vendor_number
  - name: stg_sales_order
    columns:
      - name: customer_number
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_number
